<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mos Barbers – Swansea | Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --surface2:  #242424;
      --border:    #2e2e2e;
      --gold:      #c9a84c;
      --gold-dim:  #a07830;
      --text:      #e8e8e8;
      --text-muted:#888;
      --user-bg:   #c9a84c;
      --user-text: #0f0f0f;
      --bot-bg:    #242424;
      --radius:    14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
    }

    /* ── Layout ── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--gold);
    }

    .header-text p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      margin-left: auto;
      flex-shrink: 0;
      box-shadow: 0 0 6px #4ade8088;
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      animation: fadeUp 0.18s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.bot   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    .msg-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    /* typing indicator */
    .typing .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .typing .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: bounce 1.2s infinite;
    }

    .typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input bar ── */
    .input-bar {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 12px 14px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #userInput {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 22px;
      color: var(--text);
      font-size: 15px;
      padding: 10px 16px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    #userInput:focus { border-color: var(--gold-dim); }
    #userInput::placeholder { color: var(--text-muted); }

    #sendBtn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--gold);
      color: #0f0f0f;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #sendBtn:hover  { background: #d4b060; }
    #sendBtn:active { transform: scale(0.93); }
    #sendBtn:disabled { background: var(--border); cursor: not-allowed; }

    #sendBtn svg { width: 18px; height: 18px; }

    /* ── Welcome card ── */
    .welcome {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      align-self: stretch;
    }

    .welcome h2 {
      font-size: 15px;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .quick-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .quick-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      font-family: inherit;
    }

    .quick-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Error toast ── */
    #errorToast {
      display: none;
      background: #3d1515;
      border: 1px solid #7f2020;
      color: #f87171;
      font-size: 13px;
      padding: 10px 16px;
      border-radius: 8px;
      margin: 0 16px 8px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">✂️</div>
    <div class="header-text">
      <h1>Mos Barbers</h1>
      <p>Swansea · AI Assistant</p>
    </div>
    <div class="status-dot" title="Online"></div>
  </header>

  <div id="messages">
    <div class="welcome">
      <h2>Welcome to Mos Barbers</h2>
      <p>Ask me about our services, pricing, opening hours, or anything else — I'm here to help.</p>
      <div class="quick-btns">
        <button class="quick-btn" onclick="sendQuick(this)">Services &amp; prices</button>
        <button class="quick-btn" onclick="sendQuick(this)">Opening hours</button>
        <button class="quick-btn" onclick="sendQuick(this)">How do I book?</button>
        <button class="quick-btn" onclick="sendQuick(this)">Where are you located?</button>
      </div>
    </div>
  </div>

  <div id="errorToast"></div>

  <div class="input-bar">
    <textarea
      id="userInput"
      rows="1"
      placeholder="Ask anything about Mos Barbers…"
      aria-label="Chat message"
    ></textarea>
    <button id="sendBtn" aria-label="Send message" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');
  const errorToast = document.getElementById('errorToast');

  const history = []; // { role, content }

  // Auto-grow textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendQuick(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  function now() {
    return new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = now();

    wrap.appendChild(bubble);
    wrap.appendChild(time);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot typing';
    wrap.innerHTML = `<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function showError(msg) {
    errorToast.textContent = msg;
    errorToast.style.display = 'block';
    setTimeout(() => { errorToast.style.display = 'none'; }, 5000);
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', text);
    history.push({ role: 'user', content: text });

    const typingEl = showTyping();

    try {
      const res = await fetch('/.netlify/functions/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      typingEl.remove();

      if (!res.ok) {
        showError('Something went wrong. Please try again.');
        history.pop();
        return;
      }

      const { reply, error } = await res.json();

      if (error) {
        showError('The assistant is unavailable right now. Please call us directly.');
        history.pop();
        return;
      }

      appendMessage('bot', reply);
      history.push({ role: 'assistant', content: reply });
    } catch {
      typingEl.remove();
      showError('Network error — check your connection and try again.');
      history.pop();
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
